<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Rikkei Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-bg">

    <header class="navbar">
        <div class="logo">Rikkei <span>Cinema</span></div>
        <div class="nav-menu">
            <a href="index.html">Trang Chủ</a>
            <a href="#">Thông Tin</a>
            <a href="#">Liên Hệ</a>
            <a href="./login.html" class="btn-login-nav">Đăng Nhập</a>
        </div>
    </header>

    <div class="login-container">
        <div class="login-card">
            <img src="../assets/images/Background (1).png" alt="popcorn" class="popcorn">
            
            <h2>Chào mừng quay trở lại</h2>

            <form>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-box">
                        <input type="email" placeholder="Nhập email của bạn">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="input-box">
                        <input type="password" placeholder="Nhập mật khẩu của bạn">
                        <i class="fa-regular fa-eye"></i>
                    </div>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Đăng nhập <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <p class="footer-text">Bạn chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a></p>
        </div>
    </div>

</body>
</html>
