<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo tài khoản mới - Rikkei Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body class="register-page">

    <header class="navbar">
        <div class="logo">Rikkei <span>Cinema</span></div>
        <div class="nav-menu">
            <a href="#">Trang Chủ</a>
            <a href="#">Thông Tin</a>
            <a href="#">Liên Hệ</a>
            <a href="./login.html" class="btn-login-nav">Đăng Nhập</a>
        </div>
    </header>

    <div class="register-container">
        <div class="register-card">
            <h2>Tạo tài khoản mới</h2>
            <p class="subtitle">Đăng ký để đặt vé xem phim ngay hôm nay</p>

            <form>
                <div class="input-group">
                    <label>Họ và tên</label>
                    <input type="text" placeholder="Nguyễn Văn A">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@example.com">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="******">
                        <i class="fa-regular fa-eye-slash"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="******">
                        <i class="fa-regular fa-eye-slash"></i>
                    </div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="agree">
                    <label for="agree">Tôi đồng ý với <a href="#">điều khoản sử dụng</a> và chính sách bảo mật của CineEdu.</label>
                </div>

                <button type="submit" class="btn-submit">Đăng ký <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <p class="footer-text">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
        </div>
    </div>

    <footer class="footer-copyright">
        © 2026 RikkeiEdu. Tất cả quyền được bảo mật.
    </footer>

</body>
</html>
